            pointer-events: none;
            color: transparent;
        }

        textarea {

        #output {

            border-radius: 12px;
            border: 1px solid var(--glass-border);

    <script>
        // Modified core logic from original tool
        const $backdrop = $('.backdrop');
        const $highlights = $('.highlights');
        const $textarea = $('textarea');
        
        const colorArray = [
            '#FF6633', '#FFB399', '#FF33FF', '#FFFF99', '#00B3E6', 
            '#E6B333', '#3366E6', '#999966', '#99FF99', '#B34D4D',
            '#80B300', '#809900', '#E6B3B3', '#6680B3', '#66991A', 
            '#FF99E6', '#CCFF1A', '#FF1A66', '#E6331A', '#33FFCC',
            '#66994D', '#B366CC', '#4D8000', '#B33300', '#CC80CC', 
            '#66664D', '#991AFF', '#E666FF', '#4DB3FF', '#1AB399',
            '#E666B3', '#33991A', '#CC9999', '#B3B31A', '#00E680', 
            '#4D8066', '#809980', '#E6FF80', '#1AFF33', '#999933',
            '#FF3380', '#CCCC00', '#66E64D', '#4D80CC', '#9900B3', 
            '#E64D66', '#4DB380', '#FF4D4D', '#99E6E6', '#6666FF'
        ];

        function handleInput() {
            let text = $textarea.val();
            let textArray = text.split(',');
            textArray = textArray.filter(n => n != '');
            
            const occurrences = textArray.reduce((acc, curr) => {
                let cleaned = curr.trim().toLowerCase().replace(/[\])}[{(]/g, '').replace(/(:).*/, '');
                acc[cleaned] = (acc[cleaned] || 0) + 1;
                return acc;
            }, {});
            
            let occurrencesWithColors = {};
            let i = 0;
            for (let [key, value] of Object.entries(occurrences)) {
                let color = colorArray[i % colorArray.length];
                i++;
                occurrencesWithColors[key] = [key, value, color]; 
            }
            
            let highlightedTags = textArray.map(element => {
                let key = element.trim().toLowerCase().replace(/[\])}[{(]/g, '').replace(/(:).*/, '');
                let count = occurrencesWithColors[key][1];
                let color = occurrencesWithColors[key][2];
                return (count > 1) ? `<span style="background-color: ${color}">${element}</span>` : element;
            });
            
            $highlights.html(highlightedTags.join(','));

            // Display occurrences
            let similarWordsArray = Object.values(occurrencesWithColors)
                .map(item => ({ key: item[0], occurrences: item[1] }))
                .filter(item => item.occurrences > 1)
                .sort((a, b) => b.occurrences - a.occurrences);

            let wordCountHtml = similarWordsArray.length > 0 
                ? similarWordsArray.map(item => `<p class="word-occurrences"><strong>${item.occurrences}x</strong> ${item.key}</p>`).join('')
                : '<p style="text-align:center; opacity:0.5;">No duplicates found.</p>';
            
            $('#output').html(wordCountHtml);
        }

        function handleScroll() {
            $backdrop.scrollTop($textarea.scrollTop());
            $backdrop.scrollLeft($textarea.scrollLeft());  
        }

        $textarea.on({
            'input': handleInput,
            'scroll': handleScroll
        });

        // Initial call
        handleInput();
    </script>
