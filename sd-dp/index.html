<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Duplicate Checker</title>
    <meta name="description" content="Stable Diffusion Prompt Duplicate Checker Utility">
    
    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    
    <!-- Bootstrap only for the grid/utility if needed, but we'll style over it -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

    <style>
        .tool-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }

        .tool-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .tool-header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .tool-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .editor-wrapper {
            position: relative;
            height: 400px;
            margin-bottom: 2rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        /* CRITICAL FIX: These properties MUST be identical for highlights and textarea */
        .highlights, textarea {
            padding: 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.6;
            letter-spacing: 0.5px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            overflow: auto;
            pointer-events: none;
            margin: 0;
            border: 0;
            box-sizing: border-box;
        }

        .highlights {
            color: transparent;
        }

        textarea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: transparent;
            color: var(--text-primary);
            resize: none;
            outline: none;
            overflow: auto;
            margin: 0;
            border: 0;
            box-sizing: border-box;
        }

        textarea:focus {
            background: rgba(255, 255, 255, 0.05);
        }

        .highlights span {
            border-radius: 3px;
            color: transparent;
            padding: 1px 0;
        }

        #output {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            min-height: 100px;
        }

        .word-occurrences {
            margin: 0;
            padding: 4px 0;
            font-family: 'Play', sans-serif;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tool-footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }

        .tool-footer h4 {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.9rem;
        }

        .footer-link:hover {
            color: var(--accent-purple);
        }

        .footer-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="starfield"></div>

    <header class="header">
        <nav class="nav-container">
            <div class="logo">ID</div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../aboutme/index.html">About me</a></li>
                <li><a href="../experience/index.html">Experience</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container py-5">
        <div class="tool-container reveal">
            <div class="tool-header">
                <h1>Prompt Duplicate Checker</h1>
                <p>Paste your Stable Diffusion prompts below to find and remove duplicate tags manually.</p>
            </div>

            <div class="editor-wrapper">
                <div class="backdrop">
                    <div class="highlights"></div>
                </div>
                <textarea spellcheck="false" placeholder="Paste your prompt here..."></textarea>
            </div>

            <div id="output">
                <!-- Word occurrences will appear here -->
            </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Isak Darke. All rights reserved.</p>
    </footer>

    <script src="../script.js"></script>
    <script>
        const $backdrop = $('.backdrop');
        const $highlights = $('.highlights');
        const $textarea = $('textarea');
        
        const colorArray = [
            '#FF6633', '#FFB399', '#FF33FF', '#FFFF99', '#00B3E6', 
            '#E6B333', '#3366E6', '#999966', '#99FF99', '#B34D4D',
            '#80B300', '#809900', '#E6B3B3', '#6680B3', '#66991A', 
            '#FF99E6', '#CCFF1A', '#FF1A66', '#E6331A', '#33FFCC',
            '#66994D', '#B366CC', '#4D8000', '#B33300', '#CC80CC', 
            '#66664D', '#991AFF', '#E666FF', '#4DB3FF', '#1AB399',
            '#E666B3', '#33991A', '#CC9999', '#B3B31A', '#00E680', 
            '#4D8066', '#809980', '#E6FF80', '#1AFF33', '#999933',
            '#FF3380', '#CCCC00', '#66E64D', '#4D80CC', '#9900B3', 
            '#E64D66', '#4DB380', '#FF4D4D', '#99E6E6', '#6666FF'
        ];

        function handleInput() {
          var text = $textarea.val();
          var textArray = text.split(',');
          textArray = textArray.filter(n => n.trim() !== '');

          const occurrences = textArray.reduce(function (acc, curr) {
            curr = curr.trim().toLowerCase().replace(/[\])}[{(]/g, '').replace(/(:).*/, '');
            return acc[curr] ? ++acc[curr] : acc[curr] = 1, acc;
          }, {});
          
          let occurrencesWithColors = {};
          let i = 0;
          
          for (let [key, value] of Object.entries(occurrences)) {
            let randomColor = colorArray[i];
            i++;
            if (randomColor === undefined) {
              randomColor = colorArray[Math.floor(Math.random()*colorArray.length)];
            }
            occurrencesWithColors[key.trim().toLowerCase().replace(/[\])}[{(]/g, '').replace(/(:).*/, '')] = [
              textArray.find(item => item.trim().toLowerCase().replace(/[\])}[{(]/g, '').replace(/(:).*/, '') === key),
              value, 
              randomColor
            ]; 
          };
          
          textArray = textArray.map(function(element){
            let key = element.trim().toLowerCase().replace(/[\])}[{(]/g, '').replace(/(:).*/, '');
            let number_of_occurences = occurrencesWithColors[key][1];
            let element_value = occurrencesWithColors[key][0];
            let color = occurrencesWithColors[key][2];
            
            return (number_of_occurences > 1) ? `<span style="background-color: ${color}">${element}</span>`: element;
          });
          
          newText = textArray.join(',');
          $highlights.html(newText);

          let similarWordsArray = [];
          for (let [key, value] of Object.entries(occurrencesWithColors)) {
            similarWordsArray.push({
              key: key,
              occurrences: occurrencesWithColors[key][1]
            });
          }
          similarWordsArray = similarWordsArray.sort(function( a, b ) {
            if ( a.occurrences > b.occurrences ){
              return -1;
            }
            if ( a.occurrences < b.occurrences ){
              return 1;
            }
            return 0;
          });
          
          let wordCountHtml = ``;
          similarWordsArray.forEach(function(item) {
            wordCountHtml += `<p class="word-occurrences">${item.occurrences} x ${item.key}</p>`;
          });
          $('#output').html(wordCountHtml);
        }

        function handleScroll() {
          var scrollTop = $textarea.scrollTop();
          $backdrop.scrollTop(scrollTop);
          
          var scrollLeft = $textarea.scrollLeft();
          $backdrop.scrollLeft(scrollLeft);
        }

        function bindEvents() {
          $textarea.on({
            'input': handleInput,
            'scroll': handleScroll
          });
        }

        bindEvents();
        handleInput();
    </script>
</body>
</html>
